{% load static %}

<nav class="navbar navbar-expand-lg glass-navbar fixed-top">
    <div class="container">

        <!-- LOGO / BRAND -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'accueil' %}">
            <img src="{% static 'images/cgm.jpg' %}" alt="Logo" class="logo">
            <span class="ms-2 brand-text fw-bold">IOM-CGM</span>
        </a>

        <!-- TOGGLER MOBILE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">

        <!-- MENU DESKTOP -->
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto align-items-center gap-3">

                <!-- ACCUEIL -->
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'accueil' %}nav-active{% endif %}"

                        <i class="fas fa-house"></i> Accueil
                    </a>
                </li>

                <!-- A PROPOS -->
                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'propos' %}nav-active{% endif %}"

                        <i class="fas fa-user"></i> À propos
                    </a>
                </li>

                <!-- TIMELINE -->
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle {% if request.resolver_match.url_name == 'services' or request.resolver_match.url_name == 'projets' or request.resolver_match.url_name == 'certifications' %}nav-active{% endif %}"
                        data-bs-toggle="dropdown">
                        <i class="fas fa-timeline"></i> Expertise
                    </a>

                    <ul class="dropdown-menu glass-dropdown">
                        <li>
                            <a class="dropdown-item" href="{% url 'service' %}">

                        </li>
                        <li>

                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="{% url 'certification' %}">
                                <i class="fas fa-certificate"></i> Certifications
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'faq' %}nav-active{% endif %}"
                        href="{% url 'faq' %}">

                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}nav-active{% endif %}"
                        href="{% url 'dashboard' %}">
                        <i class="fas fa-chart-line"></i> Dashboard
                    </a>
                </li>

            </ul>
